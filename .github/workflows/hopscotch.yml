name: hopscotch

# Automatically keep the `mathlib` dependency up to date. `hopscotch` bisects
# mathlib's commit history from the current pin up to `master`, advances the
# manifest to the latest passing revision, and opens (or updates) a bump PR. If
# a commit breaks the staging build, it pins to the last good commit and opens a
# tracking issue instead, which it closes again once the build recovers.

on:
  schedule:
    - cron: "0 18 * * *"   # daily at 18:00 UTC
  workflow_dispatch:        # allow manual runs from the GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the bump branch
      pull-requests: write  # open / update the bump PR
      issues: write         # open / close the tracking issue
    steps:
      - uses: actions/checkout@v5

      - uses: leanprover-community/hopscotch-action@v1
        with:
          dependency: mathlib
          to: master
          pr-base: master
          pr-labels: "dependencies,auto-bump"
