name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read # Read access to repository contents

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      # Enforce the staging import policy and the `MathlibStaging.Init`
      # requirement (see `MirrorImports.lean`). The staging syntax linters
      # (proof length, `maxHeartbeats`, `change`/`erw`) run during `lake build`.
      - name: Check mirror imports
        run: lake exe mirror_imports
      # Run mathlib's environment linters on the staging library.
      - name: Run environment linters
        run: lake lint
      # Building the API documentation and the upstreaming dashboard and
      # deploying them to GitHub Pages is handled by `pages.yml`, so that both
      # share the single GitHub Pages deployment.
