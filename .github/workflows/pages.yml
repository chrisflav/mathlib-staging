name: GitHub Pages (docs + dashboard)

# Publishes the API documentation and the Verso upstreaming dashboard together to
# GitHub Pages: a landing page at `/`, the API docs at `/docs`, and the dashboard
# at `/dashboard`.
#
# GitHub Pages allows only one deployment per repository, and docgen-action always
# uploads (and, with `deploy` on, deploys) its output directory `docs/`. So rather
# than deploy separately, we build the dashboard first and drop it into `docs/`,
# and let docgen-action perform the single upload + deploy of everything.

on:
  push:
    # TEMPORARY: `fix-pages-deploy` lets the combined site be deployed and tested
    # from this branch before merging. Remove it (and the matching `github-pages`
    # environment branch policy) before merge.
    branches: [master, fix-pages-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # elan provides the `lake` shim used both by the dashboard build below and
      # by docgen-action's doc build, so install it first.
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get mathlib build cache
        run: lake exe cache get || true

      # Build the dashboard (generate the chapter with Lean v4.32.0-rc1, build the
      # Verso site with v4.31.0) and drop it into docgen's output dir so it ships
      # alongside the API docs in the single deployment.
      - name: Build dashboard into docs/dashboard
        run: |
          lake build MathlibStaging upstream
          lake exe upstream viz --decls --format verso \
            --out dashboard/UpstreamingBlueprint/Chapters/Graph.lean
          ./dashboard/scripts/ci-pages.sh
          mkdir -p docs/dashboard
          cp -r dashboard/_out/site/html-multi/. docs/dashboard/
          cat > docs/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>mathlib-staging</title>
          <h1>mathlib-staging</h1>
          <ul>
            <li><a href="docs/">API documentation</a></li>
            <li><a href="dashboard/">Upstreaming dashboard</a></li>
          </ul>
          HTML

      # docgen-action builds the API docs into `docs/docs`, then uploads and
      # deploys the whole `docs/` directory (landing page + API docs + dashboard).
      - name: Build docs and deploy to GitHub Pages
        uses: leanprover-community/docgen-action@v1
        with:
          build-page: false
